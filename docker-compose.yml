services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rag-api:
    build:
      context: .
      dockerfile: services/rag/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LLM_PROVIDER: ${LLM_PROVIDER}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      # If LLM_PROVIDER=ollama and Ollama runs on the host (not in this compose stack), set
      # OLLAMA_BASE_URL=http://host.docker.internal:11434 in .env — "localhost" from inside this
      # container resolves to the container itself, not the host (same reasoning as gotcha #14).
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL}
      DAILY_BUDGET_USD: ${DAILY_BUDGET_USD}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD}
      KB_SEED_DIR: /app/kb/seed
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${RAG_API_PORT:-8000}:8000"
    volumes:
      - ./kb:/app/kb:ro
    depends_on:
      postgres:
        condition: service_healthy

  # Message broker for async hops (ADR-007): intake buffering (WF-1 → WF-2), outbound delivery
  # with retry/DLQ (WF-6), and ticket-event fan-out (WF-7). Both ports are published to the host
  # because n8n runs OUTSIDE this compose stack (gotcha #1) — its RabbitMQ credential connects to
  # localhost:${RABBITMQ_PORT}. Topology (exchanges/queues/bindings) is NOT declared here; run
  # `make mq-topology` after the broker is healthy (see scripts/rabbitmq_topology.py).
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Production-only reverse proxy with automatic HTTPS (Let's Encrypt via Caddy). Absent from
  # `docker compose up -d` unless explicitly requested — local dev is unaffected either way.
  # Start with: docker compose --profile prod up -d
  caddy:
    image: caddy:2-alpine
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - rag-api

volumes:
  pgdata:
  rabbitmq_data:
  caddy_data:
  caddy_config:
